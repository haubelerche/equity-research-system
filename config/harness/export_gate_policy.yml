schema_version: 1
policy_id: err_harness_export_gate_v1
scope:
  product: vietnam_pharma_equity_research
  report_type: full_report
  default_ticker: DHG
  period_type: FY
  required_periods:
    from_year: 2022
    to_year: 2025
block_on:
  - missing_source_trace_for_material_claim
  - tier3_only_material_fact
  - unresolved_major_source_discrepancy
  - missing_formula_trace
  - missing_forecast_driver
  - missing_debt_forecast_when_required
  - unresolved_na_in_valuation
  - generic_citation_only
  - llm_only_evaluation_pass
  - report_not_linked_to_valuation_snapshot
  - required_harness_gate_missing
  - evidence_packet_missing
  - stage_trace_missing
  - profit_growth_requires_bridge
  - eps_growth_requires_bridge
  - ebit_margin_jump_without_gross_margin_support
  - balance_sheet_incomplete
  - report_mentions_missing_valuation_method
  - dividend_yield_total_return_inconsistent
  - citation_coverage_below_threshold
  - recommendation_visible_before_approval
  - report_quality_score_below_85
warn_on:
  - minor_source_discrepancy
  - low_confidence_ocr_fact
  - terminal_value_dominance
  - weak_qualitative_event_evidence
required_gate_outputs:
  - gate
  - passed
  - status
  - severity
  - issues
  - blocking_reasons
  - summary
