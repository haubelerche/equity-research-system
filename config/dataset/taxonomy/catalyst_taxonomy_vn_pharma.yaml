version: 1
event_classes:
  tender:
    description: Drug tender notices, bidding outcomes, and hospital procurement updates
    event_types:
      - tender_notice
      - tender_award
      - tender_cancellation
      - tender_rebid
    key_fields: [notice_id, issuer, drug_name, quantity, unit_price, occurred_at]
    materiality_rules:
      high: "Award value >= 10% of trailing twelve month revenue"
      medium: "Award value between 3% and 10% of trailing twelve month revenue"
      low: "Award value < 3% of trailing twelve month revenue"

  bhyt_policy:
    description: Reimbursement list and payment policy changes that impact pharma demand and pricing
    event_types:
      - bhyt_reimbursement_addition
      - bhyt_reimbursement_removal
      - bhyt_reimbursement_rate_change
      - bhyt_guideline_update
    key_fields: [policy_id, effective_date, affected_drug_group, payment_rate_delta]
    materiality_rules:
      high: "Direct effect on top 3 product lines or reimbursement rate delta >= 5pp"
      medium: "Affects product portfolio but no top-line concentration impact"
      low: "Administrative or low-coverage policy update"

  regulatory:
    description: Drug Administration of Vietnam and related authority actions
    event_types:
      - regulatory_approval
      - regulatory_registration_renewal
      - regulatory_recall
      - regulatory_suspension
      - gmp_certificate_change
    key_fields: [notice_number, issued_at, affected_product, action_type]
    materiality_rules:
      high: "Recall, suspension, or registration disruption on major revenue product"
      medium: "Registration renewals and approvals with moderate product relevance"
      low: "Routine updates with limited near-term financial impact"

  company_news:
    description: Company disclosures and verified media updates relevant to valuation assumptions
    event_types:
      - company_guidance_update
      - management_change
      - capacity_expansion
      - mna_or_partnership
      - litigation_or_compliance
    key_fields: [headline, published_at, ticker, source_name]
    materiality_rules:
      high: "Changes valuation assumptions in base scenario"
      medium: "Affects one scenario or requires sensitivity update"
      low: "Contextual signal without direct assumption change"

link_to_pipeline:
  triggers_recompute:
    - event_types: [tender_award, bhyt_reimbursement_rate_change, regulatory_recall, company_guidance_update]
      invalidates_stages: [ANALYZING, VALUATING, SYNTHESIZING]
    - event_types: [management_change, capacity_expansion, regulatory_registration_renewal]
      invalidates_stages: [ANALYZING, SYNTHESIZING]
    - event_types: [tender_notice, bhyt_guideline_update]
      invalidates_stages: [ANALYZING]
