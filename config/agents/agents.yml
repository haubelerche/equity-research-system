agents:
  research_manager:
    role: ResearchManagerAgent
    model: gpt-5-mini
    temperature: 0.1
    prompt_path: prompts/research_manager.md
    allowed_tools: []
    output_schema: ResearchManagerArtifact
    budget_class: reasoning
    timeout_seconds: 200
    retry_policy: no_retry
  data_evidence:
    role: DataEvidenceAgent
    model: gpt-5-mini
    temperature: 0.0
    prompt_path: prompts/data_evidence.md
    allowed_tools: [auto_ingest, build_facts, build_index]
    output_schema: EvidencePack
    budget_class: reasoning
    timeout_seconds: 200
    retry_policy: no_retry
  financial_analysis:
    role: FinancialAnalysisAgent
    model: gpt-5-mini
    temperature: 0.1
    prompt_path: prompts/financial_analysis.md
    allowed_tools: [read_snapshot, read_ratio_artifact]
    output_schema: FinancialAnalysis
    budget_class: reasoning
    timeout_seconds: 200
    retry_policy: no_retry
  forecast_valuation:
    role: ForecastValuationAgent
    model: gpt-5-mini
    temperature: 0.1
    prompt_path: prompts/forecast_valuation.md
    allowed_tools: [run_forecast, run_valuation, read_valuation_artifact]
    output_schema: ForecastValuationArtifact
    budget_class: reasoning
    timeout_seconds: 200
    retry_policy: no_retry
  thesis_report:
    role: ThesisReportAgent
    model: gpt-5-mini
    temperature: 0.2
    prompt_path: prompts/thesis_report.md
    allowed_tools: []
    output_schema: ReportDraft
    budget_class: synthesis
    timeout_seconds: 200
    retry_policy: no_retry
  senior_critic:
    role: SeniorCriticAgent
    model: gpt-5-mini
    temperature: 0.1
    prompt_path: prompts/senior_critic.md
    allowed_tools: [evaluate_report_quality]
    output_schema: CriticReview
    budget_class: reasoning
    timeout_seconds: 200
    retry_policy: no_retry
