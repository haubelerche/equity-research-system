version: rag_golden_dbd_v2
ticker: DBD
# Live golden set: scored against the production RetrievalService (pgvector/FTS), not a
# lexical scan of OCR text files. A query "hits" when a retrieved top-5 chunk for the
# right fiscal_year contains any of expected_terms; source_tier_hit checks the matched
# chunk's reliability_tier against expected_source_tiers.
#
# Accountable evidence currently ingested for DBD = CafeF tier-2 audited IS+BS summary
# (source_type=cafef_financial, api_url provenance). expected_source_tiers therefore
# accepts [0,1,2]. Queries for line items CafeF does NOT expose (cash, financial-debt
# split, shares, dividend, AGM guidance, working capital) are kept material on purpose:
# they fail HONESTLY until DBD's full audited PDF / AGM disclosures are ingested.
schema: live_term_match_v2
queries:
  # --- Covered by CafeF tier-2 audited income statement ---
  - {id: dbd_revenue_2025, query: "DBD doanh thu bán hàng và cung cấp dịch vụ năm 2025", fiscal_year: 2025, expected_terms: ["Doanh thu bán hàng"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_revenue_2024, query: "DBD doanh thu bán hàng năm 2024", fiscal_year: 2024, expected_terms: ["Doanh thu bán hàng"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_cogs_2025, query: "DBD giá vốn hàng bán năm 2025", fiscal_year: 2025, expected_terms: ["Giá vốn hàng bán"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_gross_profit_2025, query: "DBD lợi nhuận gộp năm 2025", fiscal_year: 2025, expected_terms: ["Lợi nhuận gộp"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_financial_profit_2025, query: "DBD lợi nhuận tài chính năm 2025", fiscal_year: 2025, expected_terms: ["Lợi nhuận tài chính"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_pbt_2025, query: "DBD tổng lợi nhuận trước thuế năm 2025", fiscal_year: 2025, expected_terms: ["lợi nhuận trước thuế"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_net_income_2025, query: "DBD lợi nhuận sau thuế của công ty mẹ năm 2025", fiscal_year: 2025, expected_terms: ["Lợi nhuận sau thuế của công ty mẹ"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_net_income_2023, query: "DBD lợi nhuận sau thuế năm 2023", fiscal_year: 2023, expected_terms: ["Lợi nhuận sau thuế"], expected_source_tiers: [0,1,2], material: true}
  # --- Covered by CafeF tier-2 audited balance sheet ---
  - {id: dbd_total_assets_2025, query: "DBD tổng tài sản năm 2025", fiscal_year: 2025, expected_terms: ["Tổng tài sản"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_total_assets_2024, query: "DBD tổng tài sản năm 2024", fiscal_year: 2024, expected_terms: ["Tổng tài sản"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_current_assets_2025, query: "DBD tài sản lưu động ngắn hạn năm 2025", fiscal_year: 2025, expected_terms: ["tài sản lưu động ngắn hạn"], expected_source_tiers: [0,1,2], material: true}
  - {id: dbd_current_liabilities_2025, query: "DBD nợ ngắn hạn năm 2025", fiscal_year: 2025, expected_terms: ["Nợ ngắn hạn"], expected_source_tiers: [0,1,2], material: true}
