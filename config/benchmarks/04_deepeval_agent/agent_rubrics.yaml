version: agent_rubrics_20260615_v2
global_hard_rules:
- LLM agents must not calculate or overwrite financial facts, valuation, target price, FCFF, FCFE, WACC, or sensitivity.
- A material numeric claim requires citation/evidence_ref or must be downgraded to insufficient evidence.
- Auto-exported draft is not client-final approval.
metrics:
  role_adherence:
    threshold: 0.85
    weight: 0.25
  groundedness:
    threshold: 0.85
    weight: 0.3
  task_completion:
    threshold: 0.85
    weight: 0.2
  plan_adherence:
    threshold: 0.8
    weight: 0.15
  critic_issue_recall:
    threshold: 0.9
    weight: 0.1
blocking_failures:
- unauthorized_tool_call
- unsupported_numeric_claim
- valuation_number_changed_by_llm
- generic_citation_only
- snapshot_mismatch
