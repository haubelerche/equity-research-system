version: benchmark_metric_registry_v1
profiles:
  active: mvp
metrics:
  data_reliability_score:
    threshold: ">= 90/100"
    framework: pandera+financial_fact_reconciliation+ocr_validation_gate
    formula: weighted(core_metric_coverage, official_reconciliation_rate, provenance_coverage, period_completeness, dataframe_schema_validity, accepted_fact_confidence, ocr_resolution_health)
    rationale: Composite plan-01 score must be a measured weighted result, not a forced perfect score.
  core_metric_coverage:
    threshold: ">= 95%"
    framework: pandera
    formula: valid_required_core_metrics / required_core_metrics
    rationale: MVP requires broad core-metric coverage before valuation.
  required_periods_completeness:
    threshold: "= 100%"
    framework: pandera
    formula: required_periods_with_data / required_periods
    rationale: Every required reporting period for the evaluated report scope must be present.
  period_completeness:
    threshold: "= 100%"
    framework: pandera
    formula: complete_required_statements / required_statements
    rationale: Every required statement for the evaluated scope must be present.
  accepted_facts_source_coverage:
    threshold: "= 100%"
    framework: source_registry
    formula: accepted_facts_with_valid_source_id / accepted_facts_used_in_report
    rationale: Accepted facts used in a report must be traceable to a concrete governed source.
  provenance_coverage:
    threshold: "= 100%"
    framework: pandera
    formula: facts_with_complete_provenance / evaluated_facts
    rationale: Every evaluated fact must be traceable to a concrete source.
  official_reconciliation_rate:
    threshold: ">= 95%"
    framework: financial_fact_reconciliation
    formula: officially_reconciled_material_facts / material_facts
    rationale: Material facts need strong official-source reconciliation.
  ocr_unresolved_rate:
    threshold: "<= 5%"
    framework: ocr_validation_gate
    formula: unresolved_ocr_candidates / ocr_units_checked
    rationale: Corpus-level OCR unresolved rate is an operational warning threshold, not a hard zero release gate.
  material_ocr_error_count:
    threshold: "= 0"
    framework: ocr_validation_gate
    formula: material_numeric_ocr_errors_used_in_report
    rationale: OCR errors affecting material report numbers cannot enter final artifacts.
  duplicate_fact_count:
    threshold: "= 0"
    framework: canonical_fact_deduplication
    formula: duplicate_canonical_keys
    rationale: Canonical facts must have one governed winner per ticker-period-line-item-source-priority key.
  duplicate_fact_rate:
    threshold: "= 0%"
    framework: canonical_fact_deduplication
    formula: duplicate_canonical_keys / evaluated_canonical_facts
    rationale: Canonical facts must have one winner per governed key.
  dataframe_schema_validity:
    threshold: "= true"
    framework: pandera
    formula: pandera_dataframe_schema_validation
    rationale: Connector and golden fact rows must satisfy the governed DataFrame contract.
  valuation_method_data_readiness:
    threshold: "= true"
    framework: valuation_data_requirements+pandera
    formula: core_metric_coverage >= 95% and official_reconciliation_rate >= 95% and duplicate_fact_count = 0 and dataframe_schema_validity = true
    rationale: Data reliability should gate valuation input readiness without conflating it with valuation publishability or recommendation policy.
  hit_rate_at_5:
    threshold: ">= 90%"
    framework: production_retriever_golden_set
    formula: queries_with_relevant_evidence_in_top_5 / evaluated_queries
    rationale: MVP retrieval target from BENCHMARK_STANDARDS.md.
  mrr_at_5:
    threshold: ">= 0.75"
    framework: production_retriever_golden_set
    formula: mean(reciprocal_rank_of_first_relevant_evidence_at_5)
    rationale: MVP threshold; the target profile is 0.80.
  context_precision:
    threshold: ">= 0.80"
    framework: ragas
    formula: ragas_context_precision_mean
    rationale: MVP threshold; the target profile is 0.85.
  context_recall:
    threshold: ">= 0.80"
    framework: ragas
    formula: ragas_context_recall_mean
    rationale: MVP threshold; the target profile is 0.85.
  faithfulness:
    threshold: ">= 0.85"
    framework: ragas
    formula: ragas_faithfulness_mean
    rationale: Generated claims must be supported by retrieved evidence.
  response_relevancy:
    threshold: ">= 0.85"
    framework: ragas
    formula: ragas_response_relevancy_mean
    rationale: Responses must directly address benchmark questions.
  source_tier_hit_rate:
    threshold: ">= 90%"
    framework: source_tier_retrieval_audit
    formula: material_queries_with_priority_source_in_top_k / material_queries
    rationale: Material retrieval queries should surface priority evidence sources in the retrieved set.
  accounting_invariant_violations:
    threshold: "= 0"
    framework: deterministic_finance_gates
    formula: count(failed_critical_accounting_invariants)
    rationale: Critical accounting invariant violations can materially corrupt valuation.
  valuation_regression_failures:
    threshold: "= 0"
    framework: golden_valuation_regression
    formula: count(golden_valuation_cases_outside_tolerance)
    rationale: Golden valuation cases protect deterministic pricing logic from regression.
  share_count_mismatch:
    threshold: "= 0"
    framework: share_count_reconciliation
    formula: count(eps_or_target_price_share_count_mismatches)
    rationale: Share count mismatch directly distorts EPS and target price.
  target_price_bridge_error:
    threshold: "= 0"
    framework: valuation_bridge_reconciliation
    formula: count(non_reproducible_ev_equity_target_price_bridges)
    rationale: Target price must be reproducible from the valuation artifact.
  wacc_terminal_growth_violation:
    threshold: "= 0"
    framework: dcf_formula_gate
    formula: count(dcf_cases_with_wacc_lte_terminal_growth)
    rationale: WACC less than or equal to terminal growth invalidates the Gordon growth terminal value.
  net_debt_reconciliation_error:
    threshold: "= 0"
    framework: net_debt_reconciliation
    formula: count(net_debt_formula_mismatches)
    rationale: Net debt must reconcile before EV-to-equity bridge publication.
  unexplained_forecast_anomalies:
    threshold: "= 0"
    framework: forecast_quality_gate
    formula: count(material_forecast_anomalies_without_rationale)
    rationale: Material forecast anomalies require an explanation or catalyst before review.
  recommendation_inconsistency:
    threshold: "= 0"
    framework: recommendation_policy_gate
    formula: count(rating_current_price_target_price_upside_inconsistencies)
    rationale: Recommendation must be consistent with target price, current price, and upside/downside.
  quant_citation_coverage:
    threshold: "= 100%"
    framework: citation_coverage_evaluator
    formula: quantitative_claims_with_citation / quantitative_claims
    rationale: Every quantitative claim in a final report needs a supporting citation.
  citation_key_resolution:
    threshold: "= 100%"
    framework: citation_resolver
    formula: resolved_citation_keys / final_report_citation_keys
    rationale: Citation keys must resolve to concrete evidence.
  source_id_validity:
    threshold: "= 100%"
    framework: source_registry_validator
    formula: valid_source_ids / source_ids_used
    rationale: Invalid source IDs break auditability.
  numeric_citation_mismatch:
    threshold: "= 0"
    framework: numeric_citation_reconciliation
    formula: count(material_cited_numbers_not_matching_evidence)
    rationale: Material cited numbers must match the supporting evidence.
  tier3_only_material_claims:
    threshold: "= 0"
    framework: source_tier_policy
    formula: count(material_claims_supported_only_by_low_tier_sources)
    rationale: Material claims require official or reputable corroborating evidence.
  generic_citations:
    threshold: "= 0"
    framework: citation_label_validator
    formula: count(citations_without_specific_document_identity)
    rationale: Generic citation labels are not audit-ready.
  catalyst_without_evidence:
    threshold: "= 0"
    framework: catalyst_evidence_gate
    formula: count(thesis_catalysts_without_evidence_span)
    rationale: Catalysts used in the investment thesis must have evidence spans.
  tool_permission_compliance:
    threshold: "= 100%"
    framework: agent_tool_permission_gate
    formula: permitted_tool_calls / total_tool_calls
    rationale: Tool calls must comply with governed permissions.
  schema_validity:
    threshold: "= 100%"
    framework: json_schema_validator
    formula: valid_required_outputs / required_outputs
    rationale: Required agent outputs must satisfy their JSON schemas.
  no_unauthorized_calc:
    threshold: "= 100%"
    framework: agent_governance_gate
    formula: compliant_financial_calculation_events / checked_financial_calculation_events
    rationale: Financial calculations belong in deterministic code paths, not free-form LLM reasoning.
  artifact_manifest_compliance:
    threshold: "= 100%"
    framework: artifact_manifest_gate
    formula: stored_required_artifacts / required_artifacts
    rationale: Agent-produced artifacts must have governed storage lineage before export.
  role_adherence:
    threshold: ">= 0.85"
    framework: deepeval
    formula: deepeval_role_adherence_mean
    rationale: Provisional diagnostic threshold from BENCHMARK_STANDARDS.md.
  groundedness:
    threshold: ">= 0.85"
    framework: deepeval
    formula: deepeval_groundedness_mean
    rationale: Provisional diagnostic threshold from BENCHMARK_STANDARDS.md.
  task_completion:
    threshold: ">= 0.85"
    framework: deepeval
    formula: deepeval_task_completion_mean
    rationale: Required tasks must be materially completed.
  plan_adherence:
    threshold: ">= 0.80"
    framework: deepeval
    formula: deepeval_plan_adherence_mean
    rationale: Provisional diagnostic threshold from BENCHMARK_STANDARDS.md.
  critic_issue_recall:
    threshold: ">= 90%"
    framework: seeded_issue_evaluation
    formula: detected_seeded_issues / seeded_issues
    rationale: MVP diagnostic threshold for critic regression.
  report_quality_score:
    threshold: ">= 85/100"
    framework: report_quality_rubric
    formula: weighted_report_quality_score
    rationale: MVP report-quality threshold before human review.
  report_completeness:
    threshold: ">= 90%"
    framework: report_structure_gate
    formula: completed_required_sections / required_sections
    rationale: Missing major report sections should block export or trigger human review.
  financial_analysis_depth:
    threshold: ">= 80/100"
    framework: report_quality_rubric
    formula: financial_analysis_depth_score
    rationale: Financial analysis must have enough depth for an investment report draft.
  forecast_rationale:
    threshold: ">= 80/100"
    framework: report_quality_rubric
    formula: forecast_rationale_score
    rationale: Forecast assumptions require explicit rationale.
  valuation_transparency:
    threshold: ">= 85/100"
    framework: report_quality_rubric
    formula: valuation_transparency_score
    rationale: Valuation must be transparent enough to audit from artifacts.
  llm_retry_rate:
    threshold: "<= 5%"
    framework: langfuse_tracing
    formula: llm_retry_calls / llm_calls
    rationale: Retry rate should remain low enough to control reliability and cost-to-serve.
  retrieval_fallback_rate:
    threshold: "<= 20%"
    framework: retrieval_telemetry
    formula: fallback_retrieval_queries / retrieval_queries
    rationale: High fallback rate indicates degraded retrieval path quality.
  ocr_failure_rate:
    threshold: "<= 5%"
    framework: ocr_runtime_metrics
    formula: failed_material_ocr_documents / material_ocr_documents
    rationale: Material OCR failures should remain rare and visible.
  final_ocr_error_count:
    threshold: "= 0"
    framework: ocr_final_artifact_gate
    formula: count(ocr_errors_affecting_final_report_numbers)
    rationale: OCR errors affecting final numbers block publication.
  artifact_upload_failures:
    threshold: "= 0"
    framework: artifact_storage_gate
    formula: count(final_artifact_upload_failures)
    rationale: Final artifacts must be stored successfully.
  pdf_render_failures:
    threshold: "= 0"
    framework: pdf_render_gate
    formula: count(final_pdf_render_failures)
    rationale: Final PDF render failure blocks export.
  warm_full_report_p95_latency:
    threshold: "<= 10 minutes"
    framework: runtime_latency_window
    formula: p95(full_report_duration_seconds where run_type = warm)
    rationale: Warm full-report generation should meet the engineering latency benchmark.
  cold_full_report_p95_latency:
    threshold: "<= 30 minutes"
    framework: runtime_latency_window
    formula: p95(full_report_duration_seconds where run_type = cold)
    rationale: Cold full-report generation includes ingest/OCR and has a wider but bounded budget.
  render_only_p95_latency:
    threshold: "<= 2 minutes"
    framework: pdf_render_telemetry
    formula: p95(render_only_duration_seconds)
    rationale: Rendering from locked artifacts should be fast and reliable.
  flash_memo_warm_p95_latency:
    threshold: "<= 90 seconds"
    framework: runtime_latency_window
    formula: p95(flash_memo_duration_seconds where run_type = warm)
    rationale: Warm flash memo latency should remain low for product usability.
  flash_memo_cold_retrieval_p95_latency:
    threshold: "<= 3 minutes"
    framework: runtime_latency_window
    formula: p95(flash_memo_duration_seconds where retrieval_required = true)
    rationale: Flash memo with additional retrieval should still complete within a short workflow window.
  latency_regression_ratio:
    threshold: "<= 1.25x"
    framework: latency_regression_gate
    formula: new_p95 / baseline_p95
    rationale: Regression threshold prevents slowdowns from hiding behind absolute SLA headroom.
