version: 1
updated_at: "2026-04-20"
owner: data_ops
sources:
  - source_id: bctc_disclosure
    category: financial_statement
    description: Financial statements and disclosures from company IR pages and exchange channels
    frequency: quarterly
    format: [pdf, html, xlsx]
    key_fields: [ticker, fiscal_year, fiscal_period, published_at]
    lineage_policy:
      checksum: sha256
      version_key: [source_uri, published_at, checksum]
    legal_notes: Public disclosure documents; retain original file URI and retrieval timestamp

  - source_id: listing_metadata
    category: market_reference
    description: Listed company metadata (exchange, free-float, shares outstanding, sector tags)
    frequency: weekly
    format: [json, csv]
    key_fields: [ticker, exchange, effective_date]
    lineage_policy:
      checksum: sha256
      version_key: [source_uri, effective_date, checksum]
    legal_notes: Must preserve provider attribution and update cadence

  - source_id: tender_results
    category: catalyst_tender
    description: Public tender notices and award results relevant to pharma products
    frequency: daily
    format: [html, pdf, csv]
    key_fields: [notice_id, issuer, occurred_at, drug_name]
    lineage_policy:
      checksum: sha256
      version_key: [source_uri, notice_id, checksum]
    legal_notes: Respect robots and terms; keep snapshot for audit

  - source_id: bhyt_policy
    category: catalyst_policy
    description: BHYT reimbursement list and policy changes with effective dates
    frequency: weekly
    format: [pdf, html]
    key_fields: [policy_id, effective_date, issued_at]
    lineage_policy:
      checksum: sha256
      version_key: [source_uri, policy_id, effective_date]
    legal_notes: Maintain full policy version history for replay and model explainability

  - source_id: dav_regulatory
    category: catalyst_regulatory
    description: Drug Administration of Vietnam announcements and related notices
    frequency: daily
    format: [html, pdf]
    key_fields: [notice_number, issued_at, topic]
    lineage_policy:
      checksum: sha256
      version_key: [source_uri, notice_number, checksum]
    legal_notes: Store canonical URL and captured timestamp for traceability

  - source_id: company_news
    category: catalyst_company_news
    description: Company and industry news with stable URL and publication timestamp
    frequency: daily
    format: [html, rss, json]
    key_fields: [headline, source_name, published_at, ticker]
    lineage_policy:
      checksum: sha256
      version_key: [source_uri, published_at, checksum]
    legal_notes: Exclude paywalled or unstable URLs from citation-critical claims
