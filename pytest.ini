[pytest]
# App tests live under tests/ and must run on a plain Python 3.11 env (no Airflow).
# Restricting collection keeps `pytest` from importing dags/ (which requires Airflow,
# a separate scheduler runtime) or other non-test trees.
testpaths = tests
norecursedirs = dags astro scraper .git __pycache__ data output storage eval scale vnstock
markers =
    integration: marks tests as live integration tests (deselect with -m "not integration")
